<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <meta name="description" content="HeadsUp AI helps families remember maintenance before small problems get expensive." />
  <title>HeadsUp AI</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <div class="brand-line"><span class="brand-mark">H↑</span><span>HeadsUp AI</span></div>
        <div class="subtle" id="homeLabel">Rack & Splash Manor • Fort Worth</div>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings">⚙</button>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-tab="home" class="nav-btn active"><span>⌂</span><small>Home</small></button>
      <button data-tab="tasks" class="nav-btn"><span>✓</span><small>Tasks</small></button>
      <button data-tab="ask" class="nav-btn ai-nav"><span>✦</span><small>Ask AI</small></button>
      <button data-tab="history" class="nav-btn"><span>↺</span><small>History</small></button>
      <button data-tab="test" class="nav-btn"><span>★</span><small>Test</small></button>
    </nav>
  </div>

  <dialog id="taskDialog" class="sheet"><div id="taskDialogContent"></div></dialog>
  <dialog id="settingsDialog" class="sheet"><div id="settingsContent"></div></dialog>
  <div id="toast" class="toast" role="status"></div>

  <script type="module" src="app.js?v=2"></script>
</body>
</html>
